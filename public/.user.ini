; Raise PHP upload limits for admin media uploads (videos/images).
; Read automatically by lsphp/php-fpm on cPanel (may take up to 5 minutes
; to apply after deploy — user_ini.cache_ttl).
upload_max_filesize = 512M
post_max_size = 520M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
